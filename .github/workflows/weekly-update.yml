name: Berkenhof Weeklijst Update

on:
  schedule:
    - cron: '0 18 * * 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Genereer weeklijst HTML
        run: node generate.js

      - name: Publiceer naar GitHub Pages
        run: |
          git config --global user.email "facility@berkenhof.be"
          git config --global user.name "Berkenhof Weeklijst"
          git add berkenhof_taken.html
          git diff --staged --quiet || git commit -m "Weeklijst update $(date +'%Y-%m-%d')"
          git push
