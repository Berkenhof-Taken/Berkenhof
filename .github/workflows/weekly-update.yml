
name: Berkenhof Weeklijst Update

on:
  schedule:
    - cron: '0 18 * * 5'
  workflow_dispatch:

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Genereer weeklijst HTML
        run: node generate.js

      - name: Upload naar Netlify
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_SITE: 7d056645-a076-4fe9-b097-886d0940b408
        run: |
          zip -j deploy.zip berkenhof_taken.html
          RESP=$(curl -s -o /tmp/netlify.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $NETLIFY_TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE/deploys")
          echo "HTTP status: $RESP"
          cat /tmp/netlify.json
